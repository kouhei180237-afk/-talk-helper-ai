<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk Helper AI</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.box{
    background:#1e293b;
    padding:15px;
    margin-top:15px;
    border-radius:15px;
}

.title{
    color:#38bdf8;
    font-weight:bold;
    margin-bottom:8px;
}

.reply{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>

</head>

<body>

<h1>🎤 Talk Helper AI</h1>

<div class="box">
<div class="title">🇺🇸 相手の英語</div>
<p>Waiting...</p>
</div>

<div class="box">
<div class="title">🇯🇵 日本語</div>
<p>ここに翻訳が表示されます</p>
</div>

<div class="box">
<div class="title">💬 おすすめ返信</div>

<div class="reply">
I'm from Japan.
</div>

<div class="reply">
Nice to meet you!
</div>

<div class="reply">
How about you?
</div>

</div>

</body>
</html>
